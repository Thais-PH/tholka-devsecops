name: CI/CD MyDigitalStartup - Industrialisation & Sécurité

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: # Pour lancer le pipeline à la main si besoin

jobs:
  # --- MISSION 1 : QUALITÉ & TESTS ---
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup & Test Frontend (Nuxt)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install Nuxt dependencies
        run: |
          cd frontend
          npm install
      - name: Build Nuxt (Check compilation)
        run: |
          cd frontend
          npm run build

      # Setup & Test Backend (Drupal)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, gd, dom, curl
      - name: Install Composer dependencies
        run: |
          cd backend
          composer install --no-progress --no-interaction

  # --- MISSION 2 : SÉCURITÉ (DevSecOps) ---
  security-scans:
    needs: quality-gate # On ne scanne que si le build de base passe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nécessaire pour les scans de secrets et d'historique

      # 1. SCA (Software Composition Analysis) - Dépendances
      - name: Scan Backend (Composer Audit)
        run: |
          cd backend
          composer audit
      
      - name: Scan Frontend (NPM Audit)
        run: |
          cd frontend
          npm audit --audit-level=high || true 

      # 2. Secret Detection (Gitleaks)
      - name: Secret Detection
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true # On ne bloque pas le pipeline, mais on veut les résultats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. Container Scan (Trivy)
      # On build les images pour les scanner avant de les valider
      - name: Build Backend Image
        run: docker build -t my-backend:latest -f docker/php/Dockerfile .
      
      - name: Build Frontend Image
        run: docker build -t my-frontend:latest -f docker/nuxt/Dockerfile ./frontend

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-backend:latest'
          format: 'table'
          exit-code: '0' # Informatif pour l'évaluation
          severity: 'CRITICAL,HIGH'

      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-frontend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  deploy:
    needs: security-scans # On ne déploie QUE si la sécurité est validée
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' # On ne déploie que depuis la branche master
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/mon-projet # Adapte le chemin vers ton dossier
            git pull origin master
            # On crée un fichier .env à la volée avec tes secrets
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" > .env
            echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
            echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
            # On relance les containers
            docker compose up -d --build