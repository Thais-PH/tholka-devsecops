name: CI Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Exemple pour Node.js (à adapter selon ta stack technique [cite: 22])
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        [cite_start]run: npm install # [cite: 35]
        
      - name: Lint code
        [cite_start]run: npm run lint # [cite: 36]
        
      - name: Run tests
        [cite_start]run: npm test # [cite: 37]