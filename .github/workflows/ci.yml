name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  # --- FRONTEND (NUXT) ---
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tholka/frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Tholka/frontend/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build

  # --- BACKEND (DRUPAL) ---
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Tholka/backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, iconv, json
          tools: composer
          
      - name: Validate composer.json
        run: composer validate --strict
        
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
