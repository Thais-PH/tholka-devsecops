name: CI Quality Gate (Nuxt & Drupal)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # --- JOB FRONTEND (Nuxt) ---
  nuxt-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: npm install
      - name: Build Nuxt (Vérification compilation)
        run: npm run build

  # --- JOB BACKEND (Drupal) ---
  drupal-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3' # Drupal 11 recommande PHP 8.3
          extensions: mbstring, xml, ctype, iconv, gd, dom, curl
      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction