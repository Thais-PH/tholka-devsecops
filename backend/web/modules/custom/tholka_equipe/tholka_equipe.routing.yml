# G5 - Dashboard personnalisé
tholka_equipe.api.dashboard:
  path: '/api/dashboard'
  defaults:
    _controller: '\Drupal\tholka_equipe\Controller\DashboardApiController::getDashboard'
  methods: [GET]
  requirements:
    _permission: 'access home dashboard'


# G4 - Alertes IA
tholka_equipe.api.passport.alertes:
  path: '/api/passeport/{user_id}/alertes'
  defaults:
    _controller: '\Drupal\tholka_equipe\Controller\PassportApiController::getAlertes'
  methods: [GET]
  requirements:
    _user_is_logged_in: 'TRUE'
    user_id: '\d+'