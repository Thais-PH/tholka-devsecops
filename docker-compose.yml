services:
  db:
    image: mariadb:10.6
    container_name: tholka_db
    command: '--default-authentication-plugin=mysql_native_password'
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    networks:
      - tholka_network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tholka_php
    restart: always
    depends_on:
      - db
    networks:
      - tholka_network
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    # user: "${UID:-1000}:${GID:-1000}"

  nginx:
    image: nginx:1.25-alpine
    container_name: tholka_nginx
    ports:
      - "80:80"
    volumes:
      # - ./backend:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    restart: always
    depends_on:
      - php
    networks:
      - tholka_network

  frontend:
    # image: node:20-alpine
    build:
      context: ./frontend
      dockerfile: ../docker/nuxt/Dockerfile
    container_name: tholka_frontend
    # command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: always
    # working_dir: /app
    # volumes:
      # - ./frontend:/app
      # - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - tholka_network

volumes:
  db_data:

networks:
  tholka_network: